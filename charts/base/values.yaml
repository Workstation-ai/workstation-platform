# Workstation Platform - Base Chart Values

# Global settings
global:
  namespace: workstation
  domain: workstation.local
  storageClass: standard

# Tenant configuration
tenant:
  # Resource limits per tenant
  limits:
    cpu: "2"
    memory: "4Gi"
    storage: "50Gi"
  
  # Default namespace for tenant resources
  namespacePrefix: "tenant"

# Shared services
services:
  # PostgreSQL for state management
  postgres:
    enabled: true
    host: "postgres.workstation.svc.cluster.local"
    port: 5432
    database: "workstation"
    existingSecret: "workstation-postgres-credentials"
  
  # Redis for caching/session
  redis:
    enabled: true
    host: "redis.workstation.svc.cluster.local"
    port: 6379

# MCP Server (Multi-Cloud DevOps)
mcpServer:
  enabled: true
  image:
    repository: workstation/mcp-server
    tag: "latest"
    pullPolicy: IfNotPresent
  port: 8080
  replicas: 2
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# Monitoring
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s

# Network policies
networkPolicy:
  enabled: true
