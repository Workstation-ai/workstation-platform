# Workstation Desktop Chart Values

# Desktop configuration
desktop:
  name: ""  # Required: unique desktop name
  userId: ""  # Required: user ID for ownership

  # Desktop type: "novnc" (default, self-contained)
  type: "novnc"

  image:
    repository: workstation/desktop
    tag: "alpine"
    pullPolicy: IfNotPresent

  # Resource limits per desktop
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

  # VNC configuration
  vnc:
    port: 5900
    resolution: "1920x1080"
    depth: "24"

  # Cloudflare tunnel configuration
  tunnel:
    enabled: true
    type: "quick"  # quick tunnels = ephemeral URL

  # Persistence for desktop files
  persistence:
    enabled: false
    storageClass: "standard"
    accessModes:
      - ReadWriteOnce
    size: "5Gi"
    mountPath: "/home/desktop"

  # Auto-shutdown after inactivity (minutes)
  autoShutdown:
    enabled: false
    timeoutMinutes: 60

# Namespace configuration
namespace:
  create: false
  name: ""
