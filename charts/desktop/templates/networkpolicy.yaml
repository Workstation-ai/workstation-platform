apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "desktop.fullname" . }}
  namespace: {{ include "desktop.namespace" . }}
  labels:
    {{- include "desktop.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "desktop.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from: []
      ports:
        - protocol: TCP
          port: {{ .Values.desktop.vnc.port }}
        {{- if .Values.desktop.guacamole.enabled }}
        - protocol: TCP
          port: {{ .Values.desktop.guacamole.port }}
        {{- end }}
  egress:
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
