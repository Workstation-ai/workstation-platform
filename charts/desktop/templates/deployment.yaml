apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "desktop.fullname" . }}
  namespace: {{ include "desktop.namespace" . }}
  labels:
    {{- include "desktop.labels" . | nindent 4 }}
  annotations:
    desktop.workstation.io/user: {{ .Values.desktop.userId }}
    desktop.workstation.io/type: {{ .Values.desktop.type | quote }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "desktop.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "desktop.selectorLabels" . | nindent 8 }}
      annotations:
        desktop.workstation.io/name: {{ .Values.desktop.name | quote }}
        desktop.workstation.io/user: {{ .Values.desktop.userId | quote }}
        {{- if .Values.desktop.tunnel.enabled }}
        tunnel.workstation.io/enabled: "true"
        tunnel.workstation.io/type: {{ .Values.desktop.tunnel.type | quote }}
        {{- end }}
    spec:
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
      containers:
        - name: desktop
          image: "{{ .Values.desktop.image.repository }}:{{ .Values.desktop.image.tag | default (printf "alpine-%s" .Values.desktop.browser) }}"
          imagePullPolicy: {{ .Values.desktop.image.pullPolicy }}
          ports:
            - name: novnc
              containerPort: 6080
              protocol: TCP
            - name: vnc
              containerPort: 5900
              protocol: TCP
          env:
            - name: IDLE_TIMEOUT_MIN
              {{- if .Values.desktop.autoShutdown.enabled }}
              value: {{ .Values.desktop.autoShutdown.timeoutMinutes | quote }}
              {{- else }}
              value: "0"
              {{- end }}
          {{- if .Values.desktop.persistence.enabled }}
          volumeMounts:
            - name: home
              mountPath: /home/desktop
          {{- end }}
          resources:
            {{- include "desktop.resources" . | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: novnc
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: novnc
            initialDelaySeconds: 5
            periodSeconds: 5
        {{- if .Values.desktop.tunnel.enabled }}
        - name: cloudflared
          image: "cloudflare/cloudflared:latest"
          imagePullPolicy: Always
          command:
            - "cloudflared"
            - "tunnel"
            - "--no-autoupdate"
            - "--url"
            - "http://localhost:6080"
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
        {{- end }}
      {{- if .Values.desktop.persistence.enabled }}
      volumes:
        - name: home
          persistentVolumeClaim:
            claimName: {{ include "desktop.fullname" . }}-home
      {{- end }}
