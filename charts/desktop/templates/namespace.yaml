{{- if .Values.namespace.create }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ include "desktop.namespace" . }}
  labels:
    {{- include "desktop.labels" . | nindent 4 }}
    desktop.workstation.io/user: {{ .Values.desktop.userId | quote }}
  annotations:
    desktop.workstation.io/created-at: {{ now | date "2006-01-02T15:04:05Z" | quote }}
{{- end }}
