apiVersion: v1
kind: Service
metadata:
  name: {{ include "desktop.fullname" . }}
  namespace: {{ include "desktop.namespace" . }}
  labels:
    {{- include "desktop.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.desktop.vnc.port }}
      targetPort: vnc
      protocol: TCP
      name: vnc
    {{- if .Values.desktop.guacamole.enabled }}
    - port: {{ .Values.desktop.guacamole.port }}
      targetPort: guacamole
      protocol: TCP
      name: guacamole
    {{- end }}
  selector:
    {{- include "desktop.selectorLabels" . | nindent 4 }}
---
{{- if .Values.desktop.network.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "desktop.fullname" . }}
  namespace: {{ include "desktop.namespace" . }}
  labels:
    {{- include "desktop.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: {{ include "desktop.fullname" . }}
spec:
  {{- if .Values.desktop.network.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.desktop.network.ingress.host }}
      secretName: {{ include "desktop.fullname" . }}-tls
  {{- end }}
  rules:
    - host: {{ .Values.desktop.network.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "desktop.fullname" . }}
                port:
                  name: vnc
{{- end }}
