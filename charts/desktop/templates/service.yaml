apiVersion: v1
kind: Service
metadata:
  name: {{ include "desktop.fullname" . }}
  namespace: {{ include "desktop.namespace" . }}
  labels:
    {{- include "desktop.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 6080
      targetPort: novnc
      protocol: TCP
      name: novnc
    - port: 5900
      targetPort: vnc
      protocol: TCP
      name: vnc
  selector:
    {{- include "desktop.selectorLabels" . | nindent 4 }}
