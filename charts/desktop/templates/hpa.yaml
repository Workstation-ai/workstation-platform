{{- if .Values.desktop.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "desktop.fullname" . }}
  namespace: {{ include "desktop.namespace" . }}
  labels:
    {{- include "desktop.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "desktop.fullname" . }}
  minReplicas: {{ .Values.desktop.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.desktop.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.desktop.autoscaling.targetCPU | default 70 }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.desktop.autoscaling.targetMemory | default 80 }}
{{- end }}
