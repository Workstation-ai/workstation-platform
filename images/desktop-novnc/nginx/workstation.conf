# Workstation Center OS — nginx reverse proxy
# Handles HTTP→HTTPS redirect via X-Forwarded-Proto (Cloudflare)
# Proxies WebSocket + static files to websockify on port 6081

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 6080;
    server_name _;

    # Redirect HTTP to HTTPS (Cloudflare sets X-Forwarded-Proto)
    if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$request_uri;
    }

    # Proxy WebSocket connections to websockify
    location /websockify {
        proxy_pass http://127.0.0.1:6081/websockify;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
    }

    # Proxy all other requests to websockify (serves noVNC static files)
    location / {
        proxy_pass http://127.0.0.1:6081/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
